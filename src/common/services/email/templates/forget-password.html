<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyberpunk · 6‑Digit Code · Glass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 10%, #0b0e1a, #03050c);
      font-family: 'Space Grotesk', sans-serif;
      padding: 24px;
    }

    /* ----- GLASS + CYBERPUNK CARD (same as welcome) ----- */
    .glass-cyber-email {
      max-width: 680px;
      width: 100%;
      background: rgba(8, 20, 40, 0.25);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border-radius: 48px 48px 48px 48px;
      border: 1px solid rgba(0, 180, 255, 0.25);
      box-shadow: 
        0 20px 50px rgba(0, 0, 0, 0.8),
        inset 0 0 60px rgba(0, 150, 255, 0.15),
        0 0 0 1px rgba(0, 180, 255, 0.1);
      padding: 36px 40px 44px;
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .glass-cyber-email::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        linear-gradient(rgba(0, 180, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 180, 255, 0.02) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    .glass-cyber-email::after {
      content: '';
      position: absolute;
      top: -2px;
      left: 20%;
      width: 60%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00b4ff, #a0e0ff, #00b4ff, transparent);
      filter: blur(2px);
      opacity: 0.7;
      border-radius: 100%;
      z-index: 1;
    }

    .email-content {
      position: relative;
      z-index: 2;
    }

    /* ----- HEADER (same style) ----- */
    .email-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      border-bottom: 1px solid rgba(0, 180, 255, 0.2);
      padding-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      font-size: 32px;
      color: #00ccff;
      filter: drop-shadow(0 0 12px #0099ff);
      background: rgba(0, 180, 255, 0.08);
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      border: 1px solid rgba(0, 200, 255, 0.3);
      backdrop-filter: blur(4px);
    }

    .brand-text {
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #b0eaff, #3d9eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(0, 150, 255, 0.3);
    }

    .brand-text span {
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      text-shadow: none;
    }

    .cyber-badge {
      background: rgba(0, 180, 255, 0.08);
      border: 1px solid rgba(0, 200, 255, 0.25);
      border-radius: 60px;
      padding: 6px 16px 6px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #9bdaff;
      backdrop-filter: blur(4px);
    }

    .cyber-badge i {
      color: #00ccff;
      font-size: 12px;
    }

    /* ----- TITLE (code context) ----- */
    .code-title {
      margin-bottom: 8px;
    }

    .code-title h2 {
      font-size: 34px;
      font-weight: 700;
      background: linear-gradient(135deg, #e0f2ff, #60b0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(0, 140, 255, 0.2);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .code-title h2 i {
      color: #00ccff;
      font-size: 32px;
      filter: drop-shadow(0 0 18px #0088ff);
    }

    .code-sub {
      color: rgba(180, 220, 255, 0.6);
      font-size: 17px;
      font-weight: 400;
      border-left: 3px solid #00a6ff;
      padding-left: 18px;
      margin: 6px 0 22px 0;
      letter-spacing: -0.2px;
    }

    /* ----- 6 DIGITS · SHIELD ICONS ----- */
    .code-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px 14px;
      margin: 28px 0 30px;
    }

    .digit-shield {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 80, 180, 0.08);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(0, 180, 255, 0.2);
      border-radius: 30px;
      width: 82px;
      height: 102px;
      transition: all 0.2s ease;
      box-shadow: 
        inset 0 0 30px rgba(0, 100, 255, 0.04),
        0 8px 20px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    /* subtle glow per shield */
    .digit-shield::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 30px;
      background: linear-gradient(145deg, rgba(0, 200, 255, 0.05), transparent 70%);
      pointer-events: none;
    }

    .digit-shield i {
      font-size: 38px;
      color: #00aaff;
      filter: drop-shadow(0 0 12px rgba(0, 150, 255, 0.3));
      margin-bottom: 6px;
      transition: transform 0.2s;
    }

    .digit-shield:hover i {
      transform: scale(1.08) rotate(2deg);
    }

    .digit-shield .digit {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #b8e2ff, #3d9eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 25px rgba(0, 140, 255, 0.25);
      line-height: 1;
      margin-top: -4px;
    }

    /* small hint under each shield */
    .digit-shield .shield-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(160, 200, 255, 0.2);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ----- INFO MESSAGE (glass) ----- */
    .code-message {
      background: rgba(0, 80, 180, 0.05);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 16px 24px;
      margin: 6px 0 22px;
      border-left: 3px solid #00a6ff;
      border-right: 1px solid rgba(0, 180, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .code-message i {
      color: #00ccff;
      font-size: 20px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 160, 255, 0.06);
      border-radius: 40px;
      border: 1px solid rgba(0, 180, 255, 0.1);
    }

    .code-message p {
      color: rgba(210, 235, 255, 0.8);
      font-size: 15px;
      font-weight: 400;
      flex: 1;
    }

    .code-message p strong {
      color: #aad4ff;
      font-weight: 600;
    }

    .code-message .timer {
      color: rgba(0, 200, 255, 0.5);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 150, 255, 0.04);
      padding: 4px 14px;
      border-radius: 40px;
      border: 1px solid rgba(0, 180, 255, 0.05);
    }

    .code-message .timer i {
      font-size: 13px;
      border: none;
      background: none;
      width: auto;
      height: auto;
      color: #00bbff;
    }

    /* ----- CTA (verify) ----- */
    .cta-wrapper {
      display: flex;
      justify-content: flex-start;
      gap: 18px;
      flex-wrap: wrap;
      margin: 16px 0 24px;
    }

    .btn-cyber {
      background: rgba(0, 140, 255, 0.08);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 200, 255, 0.3);
      border-radius: 60px;
      padding: 14px 40px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 17px;
      color: #d0eeff;
      display: inline-flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      transition: all 0.25s ease;
      letter-spacing: 0.3px;
      box-shadow: 0 0 20px rgba(0, 120, 255, 0.1);
      cursor: default;
    }

    .btn-cyber i {
      color: #00ccff;
      font-size: 18px;
      transition: transform 0.2s;
    }

    .btn-cyber:hover {
      background: rgba(0, 160, 255, 0.15);
      border-color: #00a6ff;
      box-shadow: 0 0 40px rgba(0, 150, 255, 0.2);
      transform: scale(1.02);
    }

    .btn-cyber:hover i {
      transform: translateX(6px);
    }

    .btn-cyber.secondary {
      background: rgba(0, 80, 180, 0.04);
      border-color: rgba(0, 180, 255, 0.08);
      color: rgba(160, 200, 255, 0.4);
      box-shadow: none;
    }

    .btn-cyber.secondary i {
      color: rgba(0, 180, 255, 0.2);
    }

    .btn-cyber.secondary:hover {
      background: rgba(0, 100, 200, 0.06);
      border-color: rgba(0, 180, 255, 0.15);
      color: rgba(200, 225, 255, 0.6);
    }

    /* ----- FOOTER (same) ----- */
    .email-footer {
      border-top: 1px solid rgba(0, 180, 255, 0.1);
      padding-top: 24px;
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      color: rgba(160, 200, 255, 0.3);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    .footer-links {
      display: flex;
      gap: 20px;
    }

    .footer-links a {
      color: rgba(160, 200, 255, 0.4);
      text-decoration: none;
      transition: color 0.2s;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .footer-links a i {
      font-size: 13px;
      color: #0088ff;
    }

    .footer-links a:hover {
      color: #80ccff;
    }

    .footer-tag {
      color: rgba(0, 200, 255, 0.2);
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .footer-tag i {
      color: #00bbff;
      margin-right: 6px;
    }

    /* responsive */
    @media (max-width: 550px) {
      .glass-cyber-email {
        padding: 28px 18px 32px;
        border-radius: 32px;
      }
      .code-title h2 {
        font-size: 28px;
      }
      .code-grid {
        gap: 12px 10px;
      }
      .digit-shield {
        width: 68px;
        height: 90px;
      }
      .digit-shield i {
        font-size: 30px;
      }
      .digit-shield .digit {
        font-size: 28px;
      }
      .code-message {
        flex-direction: column;
        align-items: flex-start;
      }
      .email-header {
        flex-wrap: wrap;
        gap: 12px;
      }
      .btn-cyber {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="glass-cyber-email">
    <div class="email-content">

      <!-- HEADER (identical) -->
      <div class="email-header">
        <div class="brand">
          <div class="brand-icon">
            <i class="fas fa-microchip"></i>
          </div>
          <div class="brand-text">
            NEON<span>SPACE</span>
          </div>
        </div>
        <div class="cyber-badge">
          <i class="fas fa-shield-halved"></i> verification
        </div>
      </div>

      <!-- TITLE -->
      <div class="code-title">
        <h2>
          <i class="fas fa-fingerprint"></i> 6‑digit code
        </h2>
      </div>
      <div class="code-sub">
        <i class="fas fa-chevron-right" style="color: #00bbff; margin-right: 8px;"></i> 
        enter the shield sequence to confirm your identity
      </div>

      <!-- 6 DIGITS · EACH INSIDE A SHIELD ICON -->
      <div class="code-grid">
        {{#each verifyCode}}
          <div class="digit-shield">
            <i class="fas fa-shield-halved"></i>
            <span class="digit">{{ this }}</span>
            <span class="shield-label">●</span>
          </div>
        {{/each}}
      </div>

      <!-- MESSAGE + TIMER -->
      <div class="code-message">
        <i class="fas fa-clock"></i>
        <p>
          <strong>Code expires in {{ expiredTime }}</strong> · 
          enter this 6‑digit shield code to complete your login.
        </p>
        <span class="timer">
          <a href="{{ resendLink }}">
            <i class="fas fa-sync-alt fa-fw"></i> resend
          </a>
        </span>
      </div>

      <!-- FOOTER (same) -->
      <div class="email-footer">
        <div class="footer-links">
          <a href="#"><i class="fas fa-cog"></i> preferences</a>
          <a href="#"><i class="fas fa-lock"></i> security</a>
          <a href="#"><i class="fas fa-headset"></i> support</a>
        </div>
        <div class="footer-tag">
          <i class="fas fa-database"></i> 2026 · NEONSPACE
        </div>
      </div>

    </div> <!-- /.email-content -->
  </div> <!-- /.glass-cyber-email -->
</body>
</html>
